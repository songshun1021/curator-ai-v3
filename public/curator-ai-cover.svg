      <text x="246" y="68" fill="#657180" font-size="18" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">当前文件</text>
      <text x="246" y="104" fill="#1F2734" font-size="24" font-weight="700" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">岗位匹配分析</text>

      <rect x="244" y="138" width="324" height="110" rx="24" fill="white" fill-opacity="0.76"/>
      <text x="268" y="178" fill="#1D2533" font-size="22" font-weight="600" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">综合判断</text>
      <text x="268" y="216" fill="#5B6677" font-size="18" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">快速确认主简历与 JD 的匹配度，</text>
      <text x="268" y="244" fill="#5B6677" font-size="18" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">并识别优势与缺口。</text>

      <rect x="244" y="270" width="140" height="46" rx="20" fill="url(#blueChip)" stroke="#D7E5FF"/>
      <text x="281" y="299" fill="#2756B7" font-size="20" font-weight="600" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">匹配分析</text>

      <rect x="396" y="270" width="152" height="46" rx="20" fill="url(#blueChip)" stroke="#D7E5FF"/>
      <text x="428" y="299" fill="#2756B7" font-size="20" font-weight="600" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">面试准备包</text>

      <rect x="244" y="338" width="324" height="88" rx="22" fill="#F8FBFF" stroke="#E0EBFF"/>
      <text x="266" y="372" fill="#2152B2" font-size="18" font-weight="600" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">已保存到：/岗位/腾讯-产品策划/匹配度分析.md</text>
      <text x="266" y="404" fill="#677385" font-size="16" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">本次已使用：个人简历.md（PDF 文本提取）</text>
    </g>

    <g filter="url(#shadowSoft)">
      <rect x="220" y="476" width="372" height="156" rx="30" fill="url(#glass)" stroke="white" stroke-opacity="0.78"/>
      <text x="246" y="518" fill="#A0A8B5" font-size="16" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif" letter-spacing="0.22em">ASSISTANT</text>
      <text x="246" y="556" fill="#1F2734" font-size="24" font-weight="700" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">AI 助手</text>
      <rect x="244" y="580" width="250" height="22" rx="11" fill="#EEF4FF"/>
      <rect x="244" y="614" width="296" height="22" rx="11" fill="#F5F7FB"/>
