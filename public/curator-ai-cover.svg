      <text x="50" y="110" fill="#1F2734" font-size="28" font-weight="700" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">Curator AI</text>

      <rect x="44" y="152" width="136" height="52" rx="24" fill="url(#blueChip)" stroke="#D7E5FF"/>
      <text x="78" y="185" fill="#2756B7" font-size="21" font-weight="600" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">导入简历</text>

      <rect x="44" y="218" width="136" height="52" rx="24" fill="url(#blueChip)" stroke="#D7E5FF"/>
      <text x="78" y="251" fill="#2756B7" font-size="21" font-weight="600" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">新建岗位</text>

      <rect x="36" y="308" width="152" height="48" rx="20" fill="#EAF2FF" stroke="#CFE0FF"/>
