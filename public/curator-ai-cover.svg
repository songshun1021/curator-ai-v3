      <text x="144" y="668" fill="#1D2533" font-size="26" font-weight="600" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">开箱即用的 Web 工作台</text>
      <text x="144" y="714" fill="#667085" font-size="21" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">用户打开网页即可使用，按自己的模型配置继续推进。</text>
    </g>
  </g>

  <g transform="translate(850 108)" filter="url(#shadowPanel)">
