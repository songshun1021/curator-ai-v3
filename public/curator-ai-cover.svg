      <rect x="52" y="374" width="120" height="38" rx="16" fill="white" fill-opacity="0.74"/>
      <text x="68" y="398" fill="#4E5969" font-size="18" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">主简历.json</text>
      <rect x="52" y="424" width="120" height="38" rx="16" fill="white" fill-opacity="0.68"/>
      <text x="68" y="448" fill="#4E5969" font-size="18" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">个人简历.md</text>

      <text x="48" y="518" fill="#798292" font-size="18" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">岗位</text>
      <text x="48" y="552" fill="#798292" font-size="18" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">面试准备包</text>
      <text x="48" y="586" fill="#798292" font-size="18" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">面试复盘</text>
    </g>

